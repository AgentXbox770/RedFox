<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedFox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- FAVICON WITH FULL PATH AND MULTIPLE FORMATS -->
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/icon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/icon.ico">
    <meta name="msapplication-TileImage" content="/icon.ico">
    <meta name="msapplication-TileColor" content="#f15b3b">
    <meta name="theme-color" content="#f15b3b">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1e1f2a;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .redfox-browser {
            width: 100vw;
            height: 100vh;
            background: #1e1f2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
        }
        .install-prompt {
            background: #2c2f3a;
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f15b3b;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .install-prompt i {
            color: #f15b3b;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .install-prompt span {
            flex: 1;
        }
        .install-prompt button {
            background: #f15b3b;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .install-prompt button:hover {
            transform: scale(1.05);
        }
        .install-prompt button:last-child {
            background: transparent;
            color: #aaa;
            padding: 6px 10px;
            margin-left: 4px;
            transition: all 0.2s;
        }
        .install-prompt button:last-child:hover {
            color: white;
            background: #4a4d62;
            transform: scale(1.05);
        }
        .toolbar {
            background: #2d2e3a;
            padding: 8px 10px 4px 10px;
        }
        .tab-container {
            display: flex;
            gap: 5px;
            align-items: center;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
            scrollbar-color: #f15b3b #2d2e3a;
        }
        .tab-container::-webkit-scrollbar {
            height: 4px;
        }
        .tab-container::-webkit-scrollbar-thumb {
            background: #f15b3b;
            border-radius: 4px;
        }
        .tab {
            background: #1f212c;
            color: #ccc;
            border-radius: 8px 8px 0 0;
            padding: 6px 10px 6px 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            max-width: 180px;
            border: 1px solid #404353;
            border-bottom: none;
            height: 34px;
            cursor: pointer;
            transition: all 0.1s;
            animation: tabAppear 0.2s ease-out;
        }
        @keyframes tabAppear {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .tab.active {
            background: #1a1b26;
            color: white;
            border-color: #f15b3b;
            border-bottom: 2px solid #f15b3b;
        }
        .tab-favicon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .tab-favicon img {
            width: 16px;
            height: 16px;
            object-fit: contain;
            border-radius: 2px;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .tab-favicon .default-favicon {
            width: 16px;
            height: 16px;
            background: #f15b3b;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: bold;
        }
        .tab-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .close-tab {
            background: none;
            border: none;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .close-tab:hover {
            background: #4a4d62;
            color: white;
            transform: rotate(90deg);
        }
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1b26;
            margin-top: 6px;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #3b3e51;
            animation: navAppear 0.3s ease-out;
        }
        @keyframes navAppear {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .nav-btn {
            background: none;
            border: none;
            color: #ddd;
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #2f3243;
            color: #f15b3b;
            transform: scale(1.1);
        }
        .address-bar {
            flex: 1;
            background: #0f1019;
            border: 1px solid #3c4055;
            border-radius: 30px;
            padding: 8px 18px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .address-bar:focus {
            border-color: #f15b3b;
            box-shadow: 0 0 0 2px rgba(241, 91, 59, 0.2);
            transform: scale(1.01);
        }
        .content-area {
            flex: 1;
            background: white;
            width: 100%;
            height: 100%;
            animation: contentAppear 0.3s ease-out;
        }
        @keyframes contentAppear {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .webview {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        #addTabBtn {
            background: none;
            border: none;
            color: #f15b3b;
            font-size: 20px;
            margin-left: 4px;
            padding: 0 8px;
            cursor: pointer;
            transition: all 0.3s;
            animation: plusPulse 2s infinite;
        }
        @keyframes plusPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff7b5c; }
            100% { transform: scale(1); }
        }
        #addTabBtn:hover {
            transform: rotate(90deg) scale(1.2);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
        }
        .modal-content {
            background: #2d2e3a;
            color: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 25px 50px black;
            border: 1px solid #f15b3b;
            min-width: 350px;
            max-width: 90%;
            animation: modalAppear 0.2s ease-out;
        }
        @keyframes modalAppear {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content h3 {
            margin-bottom: 16px;
            color: #f15b3b;
        }
        .modal-content p, .modal-content ol {
            margin-bottom: 20px;
            line-height: 1.6;
            color: #ddd;
        }
        .modal-content ol {
            margin-left: 20px;
        }
        .modal-content button {
            background: #f15b3b;
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .modal-content button:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="redfox-browser">
        <div class="install-prompt" id="installPrompt">
            <i class="fas fa-thumbtack"></i>
            <span>Add RedFox to taskbar / Start menu for quick access</span>
            <button id="pinBtn"><i class="fas fa-thumbtack"></i> Pin</button>
            <button id="closePromptBtn"><i class="fas fa-times"></i></button>
        </div>

        <div class="toolbar">
            <div class="tab-container" id="tabContainer">
                <button id="addTabBtn">+</button>
            </div>

            <div class="nav-bar">
                <button class="nav-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                <button class="nav-btn" id="forwardBtn"><i class="fas fa-arrow-right"></i></button>
                <button class="nav-btn" id="reloadBtn"><i class="fas fa-redo-alt"></i></button>
                <input type="text" class="address-bar" id="addressInput" placeholder="Search Google or type URL">
            </div>
        </div>

        <div class="content-area">
            <iframe class="webview" id="mainFrame" src="https://www.google.com/search?igu=1"></iframe>
        </div>
    </div>

    <script>
        const tabContainer = document.getElementById('tabContainer');
        const mainFrame = document.getElementById('mainFrame');
        const addressInput = document.getElementById('addressInput');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const addTabBtn = document.getElementById('addTabBtn');
        const pinBtn = document.getElementById('pinBtn');
        const closePromptBtn = document.getElementById('closePromptBtn');
        const installPrompt = document.getElementById('installPrompt');
        
        let tabs = [];
        let activeTabId = null;
        
        function extractDomain(url) {
            try {
                const hostname = new URL(url).hostname;
                return hostname.replace('www.', '').split('.')[0];
            } catch {
                return 'site';
            }
        }
        
        function getFaviconUrl(url) {
            try {
                const domain = new URL(url).origin;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
            } catch {
                return null;
            }
        }
        
        function updateTabInfo(tabId, title, url) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab) return;
            
            tab.title = title;
            tab.url = url;
            
            const titleElement = tab.element.querySelector('.tab-title');
            titleElement.textContent = title.length > 20 ? title.substring(0, 18) + '...' : title;
            
            const faviconContainer = tab.element.querySelector('.tab-favicon');
            const domain = extractDomain(url);
            const initial = domain.charAt(0).toUpperCase();
            
            const faviconUrl = getFaviconUrl(url);
            
            faviconContainer.innerHTML = `
                <img src="${faviconUrl}" 
                     onload="this.style.display='block'" 
                     onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'default-favicon\\' style=\\'background:#f15b3b;\\'>${initial}</div>'"
                     style="display:none;">
            `;
        }
        
        function createTab() {
            const tabId = 'tab_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            const tabElement = document.createElement('div');
            tabElement.className = 'tab';
            tabElement.dataset.tabId = tabId;
            
            tabElement.innerHTML = `
                <div class="tab-favicon">
                    <div class="default-favicon" style="background:#f15b3b;">N</div>
                </div>
                <span class="tab-title">New Tab</span>
                <button class="close-tab" data-tab-id="${tabId}"><i class="fas fa-times"></i></button>
            `;
            
            tabContainer.insertBefore(tabElement, addTabBtn);
            
            const tabData = {
                id: tabId,
                element: tabElement,
                title: 'New Tab',
                url: 'https://www.google.com/search?igu=1'
            };
            
            tabs.push(tabData);
            
            tabElement.addEventListener('click', (e) => {
                if (e.target.classList.contains('close-tab') || e.target.closest('.close-tab')) return;
                switchToTab(tabId);
            });
            
            const closeBtn = tabElement.querySelector('.close-tab');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeTab(tabId);
            });
            
            return tabData;
        }
        
        function switchToTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabData = tabs.find(t => t.id === tabId);
            if (tabData) {
                tabData.element.classList.add('active');
                activeTabId = tabId;
                mainFrame.src = tabData.url;
                addressInput.value = '';
            }
        }
        
        function closeTab(tabId) {
            if (tabs.length <= 1) {
                showModal('Keep at least one tab open', 'RedFox needs at least one tab');
                return;
            }
            
            const tabIndex = tabs.findIndex(t => t.id === tabId);
            if (tabIndex === -1) return;
            
            tabs[tabIndex].element.remove();
            tabs.splice(tabIndex, 1);
            
            if (activeTabId === tabId) {
                const newActiveIndex = Math.min(tabIndex, tabs.length - 1);
                switchToTab(tabs[newActiveIndex].id);
            }
        }
        
        function showModal(title, message) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-content">
                    <h3>${title}</h3>
                    <p>${message}</p>
                    <button class="modal-close">OK</button>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('.modal-close').addEventListener('click', () => {
                document.body.removeChild(overlay);
            });
        }
        
        addTabBtn.addEventListener('click', () => {
            const newTab = createTab();
            switchToTab(newTab.id);
        });
        
        addressInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let query = addressInput.value.trim();
                if (query === '') return;
                
                let url;
                if (query.includes('.') && !query.includes(' ') && (query.startsWith('http') || !query.startsWith('https'))) {
                    if (!query.startsWith('http')) url = 'https://' + query;
                    else url = query;
                } else {
                    url = 'https://www.google.com/search?igu=1&q=' + encodeURIComponent(query);
                }
                
                mainFrame.src = url;
                
                const activeTab = tabs.find(t => t.id === activeTabId);
                if (activeTab) {
                    activeTab.url = url;
                    setTimeout(() => {
                        try {
                            const iframeDoc = mainFrame.contentDocument || mainFrame.contentWindow.document;
                            const title = iframeDoc.title;
                            if (title) {
                                updateTabInfo(activeTab.id, title, url);
                            }
                        } catch (e) {
                            const domain = extractDomain(url);
                            updateTabInfo(activeTab.id, domain.charAt(0).toUpperCase() + domain.slice(1), url);
                        }
                    }, 2000);
                }
                
                addressInput.value = '';
            }
        });
        
        mainFrame.addEventListener('load', () => {
            if (!activeTabId) return;
            
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (!activeTab) return;
            
            try {
                const iframeDoc = mainFrame.contentDocument || mainFrame.contentWindow.document;
                let title = iframeDoc.title;
                
                if (!title || title === '') {
                    const url = mainFrame.src;
                    const domain = extractDomain(url);
                    title = domain.charAt(0).toUpperCase() + domain.slice(1);
                }
                
                updateTabInfo(activeTab.id, title, mainFrame.src);
            } catch (e) {
                const url = mainFrame.src;
                const domain = extractDomain(url);
                const title = domain.charAt(0).toUpperCase() + domain.slice(1);
                updateTabInfo(activeTab.id, title, url);
            }
        });
        
        reloadBtn.addEventListener('click', () => {
            mainFrame.src = mainFrame.src;
        });
        
        backBtn.addEventListener('click', () => {
            try { history.back(); } catch(e) {}
        });
        
        forwardBtn.addEventListener('click', () => {
            try { history.forward(); } catch(e) {}
        });
        
        pinBtn.addEventListener('click', () => {
            showModal('Pin to Taskbar', 'To pin RedFox to your taskbar with icon:\n\n1. Click the browser menu (⋮)\n2. Select "More to
